services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AILMS_PASSWORD: ${AILMS_PASSWORD:-ailms}

    command:
      - postgres
      - -c
      - ssl=off

    volumes:
      - postgres_data:/var/lib/postgresql/
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:8
    container_name: redis
    restart: unless-stopped

    command:
      - sh
      - -c
      - |
        exec redis-server \
          --requirepass "${REDIS_PASSWORD}" \
          --appendonly yes

    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "${REDIS_PASSWORD}" ping

      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  kafka:
    image: apache/kafka-native:4.3.1
    container_name: kafka
    restart: unless-stopped

    ports:
      - "9093:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list

      interval: 20s
      timeout: 10s
      retries: 5

    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: keycloak
    restart: unless-stopped

    command: start

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8081:8080"

    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

    healthcheck:
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/localhost/8080 &&
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 &&
          grep '200' <&3

      interval: 30s
      timeout: 10s
      retries: 10

    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1-unprivileged
    container_name: qdrant
    restart: unless-stopped

    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-qdrant}

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - http://localhost:6333/healthz

      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  qdrant_data:
