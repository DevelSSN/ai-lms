quarkus.application.name=ailms-api-gateway

quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ailms
quarkus.datasource.username=ailms
quarkus.datasource.password=${POSTGRES_PASSWORD:ailms}
quarkus.hibernate-orm.database.generation=update

quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.password=${REDIS_PASSWORD:}

quarkus.oidc.auth-server-url=http://localhost:8081/realms/ailms
quarkus.oidc.client-id=ailms-gateway
quarkus.oidc.credentials.secret=${OIDC_SECRET:}
quarkus.oidc.application-type=service

quarkus.rest-client.orchestrator.url=http://localhost:8082

quarkus.http.port=8080
quarkus.swagger-ui.always-include=true
