quarkus.application.name=ailms-api-gateway

quarkus.http.port=10080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:7432/ailms
quarkus.datasource.username=ailms
quarkus.datasource.password=${POSTGRES_PASSWORD:ailms}
quarkus.hibernate-orm.database.generation=update

quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.password=${REDIS_PASSWORD:}

quarkus.oidc.auth-server-url=http://localhost:10081/realms/ailms
quarkus.oidc.client-id=ailms-gateway
quarkus.oidc.credentials.secret=${OIDC_SECRET:ailms-gateway-secret}
quarkus.oidc.application-type=service

quarkus.rest-client.orchestrator.url=http://localhost:10082
quarkus.swagger-ui.always-include=true
