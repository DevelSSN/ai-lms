# Quarkus Configuration
quarkus.http.port=8080

# OIDC Configuration
quarkus.oidc.auth-server-url=http://localhost:8180/realms/quarkus
quarkus.oidc.client-id=backend-service
quarkus.oidc.credentials.secret=secret
quarkus.oidc.application-type=service

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5500,http://127.0.0.1:5500
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092

# Outgoing channel
mp.messaging.outgoing.user-interactions.connector=smallrye-kafka
mp.messaging.outgoing.user-interactions.topic=user-interactions
mp.messaging.outgoing.user-interactions.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Incoming channel
mp.messaging.incoming.processed-responses.connector=smallrye-kafka
mp.messaging.incoming.processed-responses.topic=processed-responses
mp.messaging.incoming.processed-responses.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
