quarkus.application.name=ailms-orchestrator

quarkus.http.port=10082

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:7432/ailms
quarkus.datasource.username=ailms
quarkus.datasource.password=${POSTGRES_PASSWORD:ailms}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.packages=com.ailms.common.entity

quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.password=${REDIS_PASSWORD:}

quarkus.langchain4j.ollama.chat-model.model-name=deepseek-r1:7b
quarkus.langchain4j.ollama.chat-model.temperature=0 
quarkus.langchain4j.timeout=60s

quarkus.langchain4j.qdrant.host=localhost
quarkus.langchain4j.qdrant.port=10633
quarkus.langchain4j.qdrant.use-grpc=true
quarkus.langchain4j.qdrant.collection.name=my-collection
quarkus.langchain4j.qdrant.collection.vector-params.size=384
quarkus.langchain4j.qdrant.collection.vector-params.distance=Cosine

quarkus.langchain4j.chat-memory.type=MESSAGE_WINDOW
quarkus.langchain4j.chat-memory.memory-window.max-messages=20

quarkus.langchain4j.ollama.embedding-model.model-name=nomic-embed-text

quarkus.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:11092}
mp.messaging.outgoing.proactive-followups.connector=smallrye-kafka
mp.messaging.outgoing.proactive-followups.topic=proactive-followups
mp.messaging.outgoing.proactive-followups.value.serializer=io.quarkus.kafka.client.serialization.JsonbSerializer
mp.messaging.incoming.proactive-events.connector=smallrye-kafka
mp.messaging.incoming.proactive-events.topic=proactive-events
mp.messaging.incoming.proactive-events.value.deserializer=io.quarkus.kafka.client.serialization.JsonbDeserializer
mp.messaging.incoming.proactive-events.auto.offset.reset=earliest
